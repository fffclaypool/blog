---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.description %}<p class="post-desc">{{ page.description }}</p>{% endif %}
  <p class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</p>
  {% if page.translation %}<p class="lang-switch"><a href="{{ page.translation | relative_url }}">{{ page.translation_label }} »</a></p>{% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
