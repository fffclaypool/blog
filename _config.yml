title: "fffclaypool tech notes"
description: "技術メモと数理的な解説"
author: fffclaypool

# 公開 URL: https://fffclaypool.github.io/blog/
url: "https://fffclaypool.github.io"
baseurl: "/blog"

# 同日内の並び順を時刻で制御するため、未来日付の記事も公開する
future: true

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:year/:month/:day/:title/

# build から除外
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
