<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Concurrent producers push events into one queue consumed by a single serialized game loop">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f6fd0"/>
    </marker>
  </defs>

  <!-- producers -->
  <text x="99" y="34" font-size="12" fill="#6b6b70" text-anchor="middle">concurrent producers</text>
  <rect x="24" y="64" width="150" height="50" rx="10" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.6"/>
  <text x="99" y="94" font-size="14" fill="#2b2b30" text-anchor="middle">Input fiber</text>
  <rect x="24" y="176" width="150" height="50" rx="10" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.6"/>
  <text x="99" y="206" font-size="14" fill="#2b2b30" text-anchor="middle">Timer fiber</text>

  <!-- queue -->
  <text x="380" y="96" font-size="13" font-weight="700" fill="#1e54a8" text-anchor="middle">Queue</text>
  <rect x="300" y="104" width="160" height="92" rx="10" fill="#eef4fc" stroke="#cfe0f6" stroke-width="1.6"/>
  <rect x="320" y="138" width="24" height="24" rx="4" fill="#ffffff" stroke="#2f6fd0"/>
  <rect x="352" y="138" width="24" height="24" rx="4" fill="#ffffff" stroke="#2f6fd0"/>
  <rect x="384" y="138" width="24" height="24" rx="4" fill="#ffffff" stroke="#2f6fd0"/>
  <rect x="416" y="138" width="24" height="24" rx="4" fill="#ffffff" stroke="#2f6fd0"/>

  <!-- producers -> queue -->
  <line x1="178" y1="89" x2="296" y2="135" stroke="#2f6fd0" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="178" y1="201" x2="296" y2="165" stroke="#2f6fd0" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- queue -> game loop -->
  <line x1="460" y1="150" x2="554" y2="150" stroke="#2f6fd0" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="507" y="140" font-size="11" fill="#6b6b70" text-anchor="middle">one at a time</text>

  <!-- game loop -->
  <text x="658" y="96" font-size="12" fill="#6b6b70" text-anchor="middle">serialized consumer</text>
  <rect x="558" y="104" width="200" height="92" rx="10" fill="#ffffff" stroke="#2f6fd0" stroke-width="2"/>
  <text x="658" y="134" font-size="15" font-weight="700" fill="#2b2b30" text-anchor="middle">Game loop</text>
  <text x="658" y="155" font-size="11" fill="#6b6b70" text-anchor="middle">single consumer</text>
  <text x="658" y="177" font-size="12" fill="#1e54a8" text-anchor="middle">update(state, input)</text>

  <!-- game loop -> state -->
  <line x1="658" y1="196" x2="658" y2="230" stroke="#2f6fd0" stroke-width="1.6" marker-end="url(#ah)"/>
  <rect x="558" y="232" width="200" height="46" rx="10" fill="#eef4fc" stroke="#cfe0f6"/>
  <text x="658" y="260" font-size="14" font-weight="700" fill="#2b2b30" text-anchor="middle">next State</text>

  <text x="430" y="306" font-size="12" font-style="italic" fill="#6b6b70" text-anchor="middle">exactly one path to the next state</text>
</svg>
