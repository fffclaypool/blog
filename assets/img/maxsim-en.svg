<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="MaxSim: each query token takes the max similarity over document tokens, then sums">
  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f6fd0"/>
    </marker>
  </defs>

  <!-- column headers: document tokens -->
  <text x="280" y="28" font-size="12" fill="#6b6b70" text-anchor="middle">document tokens  v₁ … v₅</text>
  <!-- row headers: query tokens -->
  <text x="34" y="150" font-size="12" fill="#6b6b70" text-anchor="middle" transform="rotate(-90 34 150)">query tokens  uᵢ</text>

  <!-- grid 3 rows x 5 cols; highlight one max per row -->
  <rect x="96"  y="64" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="150" y="64" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="204" y="64" width="50" height="42" rx="4" fill="#2f6fd0" stroke="#1e54a8"/>
  <rect x="258" y="64" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="312" y="64" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="96"  y="110" width="50" height="42" rx="4" fill="#2f6fd0" stroke="#1e54a8"/>
  <rect x="150" y="110" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="204" y="110" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="258" y="110" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="312" y="110" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="96"  y="156" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="150" y="156" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="204" y="156" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>
  <rect x="258" y="156" width="50" height="42" rx="4" fill="#2f6fd0" stroke="#1e54a8"/>
  <rect x="312" y="156" width="50" height="42" rx="4" fill="#f3f6fb" stroke="#dde6f2"/>

  <!-- "max" labels in highlighted cells -->
  <text x="229" y="90"  font-size="11" fill="#ffffff" text-anchor="middle">max</text>
  <text x="121" y="136" font-size="11" fill="#ffffff" text-anchor="middle">max</text>
  <text x="283" y="182" font-size="11" fill="#ffffff" text-anchor="middle">max</text>

  <!-- arrows from each row max to the sum -->
  <line x1="362" y1="85"  x2="430" y2="120" stroke="#2f6fd0" stroke-width="1.4" marker-end="url(#ah2)"/>
  <line x1="362" y1="131" x2="430" y2="128" stroke="#2f6fd0" stroke-width="1.4" marker-end="url(#ah2)"/>
  <line x1="362" y1="177" x2="430" y2="136" stroke="#2f6fd0" stroke-width="1.4" marker-end="url(#ah2)"/>

  <!-- sum node -->
  <rect x="432" y="104" width="104" height="48" rx="8" fill="#dbe7f8" stroke="#2f6fd0" stroke-width="1.6"/>
  <text x="484" y="126" font-size="13" font-weight="700" fill="#1e54a8" text-anchor="middle">Σ</text>
  <text x="484" y="143" font-size="10" fill="#6b6b70" text-anchor="middle">= s(q, d)</text>

  <text x="280" y="238" font-size="11" fill="#6b6b70" text-anchor="middle">Each query token picks its most similar document token (the row-wise max);</text>
  <text x="280" y="256" font-size="11" fill="#6b6b70" text-anchor="middle">the sum of those maxima is the score.</text>
</svg>
