<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="A pure core enclosed by an impure ZIO shell">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f6fd0"/>
    </marker>
  </defs>

  <!-- impure shell -->
  <rect x="12" y="26" width="696" height="300" rx="14" fill="#eef4fc" stroke="#cfe0f6" stroke-width="1.5"/>
  <text x="30" y="54" font-size="15" font-weight="700" fill="#1e54a8">Impure shell (ZIO effects)</text>
  <text x="30" y="74" font-size="12" fill="#6b6b70">input · timing · rendering · persistence</text>

  <!-- pure core -->
  <rect x="200" y="120" width="320" height="150" rx="12" fill="#ffffff" stroke="#2f6fd0" stroke-width="2"/>
  <text x="360" y="159" font-size="20" font-weight="700" fill="#2b2b30" text-anchor="middle">Pure core</text>
  <text x="360" y="187" font-size="14" fill="#1e54a8" text-anchor="middle">(State, Input) ⇒ State</text>
  <text x="360" y="210" font-size="12" fill="#6b6b70" text-anchor="middle">deterministic · no clock · no I/O</text>
  <rect x="210" y="230" width="300" height="26" rx="13" fill="#eef4fc" stroke="#cfe0f6"/>
  <text x="360" y="247" font-size="11" fill="#2f6fd0" text-anchor="middle">compile-time: no var / null / throw / return</text>

  <!-- flows across the boundary -->
  <line x1="92" y1="195" x2="196" y2="195" stroke="#2f6fd0" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="144" y="183" font-size="12" fill="#6b6b70" text-anchor="middle">events in</text>
  <line x1="524" y1="195" x2="636" y2="195" stroke="#2f6fd0" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="580" y="183" font-size="12" fill="#6b6b70" text-anchor="middle">state out</text>
</svg>
